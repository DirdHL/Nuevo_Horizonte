<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canchas Carabayllo</title>
    <link rel="stylesheet" href="canchas-carabayllo.css">
    <link href="https://fonts.cdnfonts.com/css/bluesilky" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/telephasic-brk-2" rel="stylesheet">
</head>
<body>

<section class="container">
    <!-- HEADER -->
    <header class="header">
    <a href="#" class="logo-link" id="logo-link">
    <img src="../../../img/academia/logo-academia.svg" 
        alt="Logo Carabayllo" class="logo">
</a>
    </header>

<section class="banner-section">

    <img src="../../../img/canchas-carabayllo/banner.png"
        alt="Banner Cancha"
        class="banner-img">

</section>

<!-- Player ABAJO de la imagen -->
<div class="player-container">
    <a href="https://wa.me/51963666205" 
    target="_blank" 
    class="player-link">
        <img src="../../../img/canchas-carabayllo/comunicación.svg" 
            class="player" 
            alt="WhatsApp">
    </a>
</div>

<section class="cancha-selector">
    <!-- BOTONES SUPERIORES -->
    <div class="selector-buttons">
        <img src="../../../img/canchas-carabayllo/los-pinos-boton.svg" 
            alt="Cancha Los Pinos"
            class="selector-btn" 
            data-target="pinos">
        <img src="../../../img/canchas-carabayllo/las-brisas-boton.svg" 
            alt="Cancha Las Brisas"
            class="selector-btn" 
            data-target="brisas">
    </div>
    <!-- SECCIÓN QUE CAMBIA -->
    <div class="cancha-content">
        <!-- Imagen que cambia -->
    <picture id="cancha-picture" class="cancha-image">
    <img id="cancha-image"
        src="../../../img/canchas-carabayllo/pinos-img.png"
        alt="Imagen Cancha">
</picture>

        <!-- Botón pequeño al lado derecho -->
    <a href="https://maps.app.goo.gl/SLa8suG5T4r9CnCT6" class="mini-btn-link" target="_blank">
    <img src="../../../img/canchas-carabayllo/mapa-boton.svg"
        alt="Botón pequeño"
        class="mini-btn">
</a>
    </div>
</section>

<!-- =========================
SECCIÓN GALERÍA DE ACADEMIAS
========================= -->
<section id="galeria" class="galeria-section">
<div class="galeria-filtros">
    <button class="activo" data-filter="todo">TODO</button>
    <button data-filter="pinos">LOS PINOS</button>
    <button data-filter="brisas">LAS BRISAS</button>
    </div>

    <div class="galeria-grid-wrapper">
    <div class="galeria-grid">

        <div class="galeria-item pinos"><img src="../../../img/canchas-carabayllo/album-pinos-1.png" alt=""></div>
        <div class="galeria-item brisas"><img src="../../../img/canchas-carabayllo/album-brisas-1.png" alt=""></div>

        <div class="galeria-item pinos"><img src="../../../img/canchas-carabayllo/album-pinos-2.png" alt=""></div>
        <div class="galeria-item brisas"><img src="../../../img/canchas-carabayllo/album-brisas-2.png" alt=""></div>

        <div class="galeria-item pinos"><img src="../../../img/canchas-carabayllo/album-pinos-3.png" alt=""></div>
        <div class="galeria-item brisas"><img src="../../../img/canchas-carabayllo/album-brisas-3.png" alt=""></div>

        <div class="galeria-item pinos"><img src="../../../img/canchas-carabayllo/album-pinos-4.png" alt=""></div>
        <div class="galeria-item brisas"><img src="../../../img/canchas-carabayllo/album-brisas-4.png" alt=""></div>
    </div>
</div>
</section>

<footer class="footer-modern">

    <div class="footer-container">

        <!-- COLUMNA 1: LOGO Y DESCRIPCIÓN -->
        <div class="footer-col footer-brand">
            <img src="../../../img/academia/logo-academia.svg" alt="Logo academia">

            <p class="brand-text">
                Formación deportiva con disciplina, valores y crecimiento personal.
            </p>
        </div>

        <!-- COLUMNA 3: CONTACTO -->
        <div class="footer-col">
            <h3>Contacto</h3>
            <ul>
                <li><a href="tel:+51963666205">+51 963 666 205</a></li>
                <li>Carabayllo - Lima, Perú</li>
            </ul>
        </div>

        <!-- COLUMNA 4: REDES -->
        <div class="footer-col">
            <h3>Redes Sociales</h3>
            <div class="social-icons">
                <a href="https://wa.me/51963666205" target="_blank" class="icon whatsapp">✦</a>
                <a href="#" target="_blank" class="icon facebook">✦</a>
            </div>
        </div>
    </div>


    <!-- BOTTOM -->
    <div class="footer-bottom">
        © <span id="year"></span> Academia Deportiva Carabayllo — Todos los derechos reservados.
    </div>
</footer>

<script src="canchas-carabayllo.js"></script>
</body>
</html>
