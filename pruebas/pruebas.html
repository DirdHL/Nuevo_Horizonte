<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.cdnfonts.com/css/domyniq-crush" rel="stylesheet">
  <link rel="icon" href="../../../img/magia-del-rebote/logo-magia-del-rebote.svg" type="image/svg+xml">

<header class="header">
<div class="contact">
  <!-- DESKTOP -->
  <span class="contact-text">
    Llámanos Ahora: <strong>(+51) 974 265 643</strong>

  <!-- MOBILE -->
  <a href="tel:+51974265643" class="contact-mobile">
    <img
      src="../../../img/magia-del-rebote/telefono.png"
      alt="Teléfono"
