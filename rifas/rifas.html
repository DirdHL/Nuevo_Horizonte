<!DOCTYPE html>
<html lang="es">
<!-- La cabeza  -->
<head>
    <meta charset="UTF-8">
    <title>LA GRAN RIFA</title>
    <link rel="stylesheet" href="rifas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header class="header">

    <div class="logos">
        <img src="../img/rifas/sport-victoria-logo.png" alt="Sport Victoria">
    </div>

    <!-- AGRUPAMOS -->
    <div class="right">
        <nav class="menu">
            <a href="#">🎟️ Mis Tickets</a>
            <a href="#">🏆 Ganadores</a>
            <a href="#">🎁 Premios</a>
        </nav>

    <div class="redes">
    <a href="https://facebook.com" target="_blank">
        <i class="fab fa-facebook-f"></i>
    </a>
    <a href="https://wa.me/51963666205" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>
</div>
</header>

<main class="contenido">

    <section class="hero">
        <h1>
            GRAN RIFA
            <span>POR FIESTAS PATRIAS</span>
        </h1>

        <button class="btn-comprar">🎟️ Comprar Ticket</button>
    </section>

    <!-- CONTADOR -->
    <section class="contador">
        <div class="tiempo" id="tiempo"></div>
        <div class="fecha">27 - 07 - 2026</div>
    </section>

    <!-- PREMIOS -->
    <section class="premios">

        <h2>🎁 Premios</h2>

        <div class="cards">

            <div class="card">
                <h3>🥇 Primer Premio</h3>
                <p>"AUTO 0 KM"</p>
            </div>

            <div class="card">
                <h3>🥈 Segundo Premio</h3>
                <p>"Moto lineal"</p>
            </div>

            <div class="card">
                <h3>🥉 Tercer Premio</h3>
                <p>"DINERO EN EFECTIVO"</p>
            </div>
        </div>
    </section>
</main>

<script src="rifas.js"></script>
</body>
</html>
