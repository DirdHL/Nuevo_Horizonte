<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gran Rifa - Fiestas Patrias</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="rifas.css">

</head>
<body>

    <!-- =======================================================
         HEADER PRINCIPAL
    ======================================================== -->
    <header class="header-rifa">

        <div class="header-container">

            <!-- =======================================================
                 LOGO + TITULO
            ======================================================== -->
            <div class="branding">

                <!-- Logo -->
                <div class="logo-wrapper">

                    <img
                        src="../img/rifas/sport-victoria-logo.png"
                        alt="Logo Rifa"
                        class="logo-rifa"
                    >

                </div>

                <!-- Texto -->
                <div class="titulo-container">

                    <h1 class="titulo-principal">
                        GRAN RIFA
                    </h1>

                    <p class="subtitulo">
                        POR FIESTAS PATRIAS
                    </p>

                </div>

            </div>

            <!-- =======================================================
                MENU CENTRAL
            ======================================================== -->
            <nav class="menu-rifa">

                <!-- ITEM -->
                <a href="#" class="menu-item">

                    <div class="icon-box">

                        <img
                            src="../img/rifas/cabeza-ticket-1.svg"
                            class="icon-default"
                            alt="Tickets"
                        >

                        <img
                            src="../img/rifas/cabeza-ticket-2.svg"
                            class="icon-hover"
                            alt="Tickets Hover"
                        >

                    </div>

                    <span>Mis Tickets</span>

                </a>

                <!-- ITEM -->
                <a href="#" class="menu-item">

                    <div class="icon-box">

                        <img
                            src="../img/rifas/cabeza-ganadores-1.svg"
                            class="icon-default"
                            alt="Ganadores"
                        >

                        <img
                            src="../img/rifas/cabeza-ganadores-2.svg"
                            class="icon-hover"
                            alt="Ganadores Hover"
                        >

                    </div>

                    <span>Ganadores</span>

                </a>

                <!-- ITEM -->
                <a href="#" class="menu-item">

                    <div class="icon-box">

                        <img
                            src="../img/rifas/cabeza-premios-1.svg"
                            class="icon-default"
                            alt="Premios"
                        >

                        <img
                            src="../img/rifas/cabeza-premios-2.svg"
                            class="icon-hover"
                            alt="Premios Hover"
                        >

                    </div>

                    <span>Premios</span>

                </a>

            </nav>

<!-- =======================================================
    BOTONES SOCIALES
======================================================= -->
<div class="social-buttons">

    <!-- FACEBOOK -->
    <a 
        href="https://www.facebook.com/SportVictoria.cs"
        target="_blank"
        class="social-btn"
    >

        <div class="social-icon-box">

            <!-- Imagen normal -->
            <img
                src="../img/rifas/cabeza-facebook-1.svg"
                alt="Facebook"
                class="social-icon-default"
            >

        </div>

    </a>

    <!-- WHATSAPP -->
    <a 
        href="https://wa.me/51963666205?text=¡Hola!%20👋%20Quisiera%20obtener%20más%20información%20y%20comprar%20un%20ticket%20para%20la%20Gran%20Rifa%20por%20Fiestas%20Patrias.%20🎟️"
        target="_blank"
        class="social-btn"
    >

        <div class="social-icon-box">

            <!-- Imagen normal -->
            <img
                src="../img/rifas/cabeza-wsp.svg"
                alt="WhatsApp"
                class="social-icon-default"
            >
        </div>

    </a>

</div>

<!-- =======================================================
     BOTON COMPRAR TICKET
======================================================= -->
<a 
    href="https://wa.me/51983406127?text=¡Hola!%20👋%20Estoy%20interesado%20en%20comprar%20un%20ticket%20para%20la%20Gran%20Rifa.%20🎟️"
    class="btn-ticket"
    target="_blank"
>

    <!-- Icono -->
    <div class="btn-ticket-icon">

        <img
            src="../img/rifas/cabeza-boton-rifas.svg"
            alt="Comprar Ticket"
        >

    </div>

    <!-- Texto -->
    <span>
        COMPRAR TICKET
    </span>

</a>
        </div>    

    </header>

<!-- =======================================================
    HERO PRINCIPAL
======================================================= -->
<section class="hero-rifa">

    <!-- Overlay -->
    <div class="hero-overlay"></div>

    <!-- CONTENIDO HERO -->
    <div class="hero-content">

    <!-- Línea superior -->
    <div class="hero-line"></div>

    <!-- Tag -->
    <p class="hero-tag">
        ✨ EVENTO OFICIAL 2026
    </p>

    <!-- TITULO -->
    <h2 class="hero-title">

        <span class="title-blue">
            GRAN
        </span>

        <span class="title-gold">
            RIFA
        </span>

    </h2>

    <!-- Línea -->
    <div class="hero-line hero-line-small"></div>

    <!-- SUBTITULO -->
    <h3 class="hero-subtitle">
        POR FIESTAS PATRIAS
    </h3>

    <!-- FEATURES -->
    <div class="hero-features">

        <div class="hero-feature">
            ✨ PREMIOS EXCLUSIVOS
        </div>

        <div class="hero-feature">
            🎟 CUPOS LIMITADOS
        </div>

        <div class="hero-feature">
            🏆 PARTICIPA Y GANA
        </div>

    </div>

</div> 

</section>

    <!-- JS -->
    <script src="rifas.js"></script>

</body>
</html>
