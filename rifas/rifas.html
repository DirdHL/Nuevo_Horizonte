<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gran Rifa - Fiestas Patrias</title>
    <meta name="description"
        content="Compra tickets para la Gran Rifa por Fiestas Patrias con Sport Victoria. Participa en el sorteo oficial y gana premios exclusivos.">
    <meta property="og:title" content="Gran Rifa - Fiestas Patrias">
    <meta property="og:description"
        content="Compra tickets para la Gran Rifa por Fiestas Patrias con Sport Victoria. Participa en el sorteo oficial y gana premios exclusivos.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="../img/rifas/sport-victoria-logo.png">
    <meta property="og:url" content="https://tusitio.com/rifas.html">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="rifas.css">
    <link rel="stylesheet" href="./css/card.css">

</head>

<body>

    <!-- =======================================================
        HEADER PRINCIPAL
    ======================================================== -->
    <header class="header-rifa">

        <div class="header-container">

            <!-- =======================================================
                LOGO + TITULO
            ======================================================== -->
            <div class="branding">

                <!-- Logo -->
                <div class="logo-wrapper">
                    <img src="../img/rifas/sport-victoria-logo.png" alt="Logo de Sport Victoria para la Gran Rifa"
                        class="logo-rifa">
                </div>

                <!-- Texto -->
                <div class="titulo-container">

                    <h1 class="titulo-principal">
                        GRAN RIFA
                    </h1>

                    <p class="subtitulo">
                        POR FIESTAS PATRIAS
                    </p>

                </div>

            </div>

            <!-- =======================================================
                MENU CENTRAL
            ======================================================== -->
            <nav class="menu-rifa" aria-label="Menú principal">

                <!-- ITEM -->
                <a href="javascript:void(0)" class="menu-item">

                    <div class="icon-box">

                        <img src="../img/rifas/cabeza-ticket-1.svg" class="icon-default" alt="Tickets">

                        <img src="../img/rifas/cabeza-ticket-2.svg" class="icon-hover" alt="Tickets Hover">

                    </div>

                    <span>Mis Tickets</span>

                </a>

                <!-- ITEM -->
                <a href="#" class="menu-item">

                    <div class="icon-box">

                        <img src="../img/rifas/cabeza-ganadores-1.svg" class="icon-default" alt="Ganadores">

                        <img src="../img/rifas/cabeza-ganadores-2.svg" class="icon-hover" alt="Ganadores Hover">

                    </div>

                    <span>Ganadores</span>

                </a>

                <!-- ITEM -->
                <a href="#" class="menu-item">

                    <div class="icon-box">

                        <img src="../img/rifas/cabeza-premios-1.svg" class="icon-default" alt="Premios">

                        <img src="../img/rifas/cabeza-premios-2.svg" class="icon-hover" alt="Premios Hover">

                    </div>

                    <span>Premios</span>

                </a>

            </nav>

            <!-- =======================================================
    BOTONES SOCIALES
======================================================= -->
            <div class="social-buttons">

                <!-- FACEBOOK -->
                <a href="https://www.facebook.com/SportVictoria.cs" target="_blank" rel="noopener noreferrer"
                    class="social-btn" aria-label="Facebook de Sport Victoria">

                    <div class="social-icon-box">

                        <!-- Imagen normal -->
                        <img src="../img/rifas/cabeza-facebook-1.svg" alt="Facebook" class="social-icon-default">

                    </div>

                </a>

                <!-- WHATSAPP -->
                <a href="https://wa.me/51963666205?text=..." target="_blank" rel="noopener noreferrer"
                    class="social-btn" aria-label="WhatsApp de Sport Victoria">

                    <div class="social-icon-box">

                        <!-- Imagen normal -->
                        <img src="../img/rifas/cabeza-wsp.svg" alt="WhatsApp" class="social-icon-default">
                    </div>

                </a>

            </div>

            <!-- =======================================================
     BOTON COMPRAR TICKET
======================================================= -->
            <a href="https://wa.me/51983406127?text=..." class="btn-ticket" target="_blank" rel="noopener noreferrer"
                aria-label="Comprar ticket por WhatsApp">
                <!-- Icono -->
                <div class="btn-ticket-icon">

                    <img src="../img/rifas/cabeza-boton-rifas.svg" alt="Comprar Ticket">

                </div>

                <!-- Texto -->
                <span>
                    COMPRAR TICKET
                </span>

            </a>
        </div>

    </header>


    <main>
        <!-- =======================================================
    HERO PRINCIPAL
======================================================= -->
        <section class="hero-rifa">

            <!-- Overlay -->
            <div class="hero-overlay"></div>

            <!-- CONTENIDO HERO -->
            <div class="hero-content">

                <!-- Tag -->
                <p class="hero-tag">
                    ✨ EVENTO OFICIAL 2026
                </p>

                <!-- TITULO -->
                <h2 class="hero-title">

                    <span class="title-blue">
                        GRAN
                    </span>

                    <span class="title-gold">
                        RIFA
                    </span>
                </h2>

                <!-- Línea -->
                <div class="hero-line hero-line-small"></div>

                <!-- SUBTITULO -->
                <h3 class="hero-subtitle">
                    POR FIESTAS PATRIAS
                </h3>

                <!-- =======================================================
    CONTADOR PREMIUM
======================================================= -->
                <div class="contador" aria-live="polite" aria-atomic="true">
                    <div class="contador-label">
                        EL SORTEO TERMINA EN
                    </div>

                    <div class="tiempo">

                        <!-- DIAS -->
                        <div class="tiempo-box">

                            <div class="tiempo-icon">
                            </div>
                            <span id="dias">
                                00
                            </span>
                            <p>DÍAS</p>
                        </div>

                        <!-- HORAS -->
                        <div class="tiempo-box">

                            <div class="tiempo-icon">

                            </div>

                            <span id="horas">
                                00
                            </span>

                            <p>HORAS</p>

                        </div>

                        <!-- MINUTOS -->
                        <div class="tiempo-box">

                            <div class="tiempo-icon">

                            </div>

                            <span id="minutos">
                                00
                            </span>

                            <p>MINUTOS</p>
                        </div>

                        <!-- SEGUNDOS -->
                        <div class="tiempo-box">
                            <div class="tiempo-icon">
                            </div>
                            <span id="segundos">
                                00
                            </span>
                            <p>SEGUNDOS</p>
                        </div>
                    </div>

                    <p class="fecha">
                        27 JULIO 2026 • 3:00 PM
                    </p>

                </div>
            </div>
        </section>

        <!-- =======================================================
            SECCION PREMIOS
        ======================================================== -->
        <section class="premios-section" id="premios">

            <!-- Overlay -->
            <div class="premios-overlay"></div>

            <!-- CONTENIDO PREMIOS -->
            <div class="premios-content">

                <!-- Header -->
                <div class="premios-header">

                    <!-- Título -->
                    <h2 class="premios-title">
                        <span class="star-left">★</span>
                        PREMIOS
                        <span class="star-right">★</span>
                    </h2>

                    <!-- Línea decorativa -->
                    <div class="premios-line"></div>

                    <!-- Subtítulo -->
                    <p class="premios-subtitle">¡ESTOS SON LOS INCREÍBLES PREMIOS QUE PUEDES GANAR!</p>

                </div>

                <!-- =======================================================
                    CUADROS DE PREMIOS
                ======================================================== -->
                <div class="premios-grid">

                    <!-- CUADRO 1 - Naranja fluorescente -->
                    <div class="premio-card premio-card--naranja">

                        <div class="premio-img-wrapper">
                            <img src="../img/rifas/premio-auto.png" alt="Premio Auto" class="premio-img">
                        </div>

                    </div>

                    <!-- CUADRO 2 - Rojo fluorescente -->
                    <div class="premio-card premio-card--rojo">

                        <div class="premio-img-wrapper">
                            <img src="../img/rifas/premio-moto.png" alt="Premio Moto" class="premio-img">
                        </div>

                    </div>

                    <!-- CUADRO 3 - Verde fluorescente (Dinero) -->
                    <div class="premio-card premio-card--verde">

                        <div class="premio-img-wrapper">
                            <picture class="premio-img-picture">
                                <!-- PC -->
                                <source media="(min-width: 1101px)" srcset="../img/rifas/premio-dinero.png">
                                <!-- Laptop -->
                                <source media="(min-width: 601px)" srcset="../img/rifas/premio-dinero-table.png">
                                <!-- Celular -->
                                <img src="../img/rifas/premio-dinero-celular.png" alt="Premio Dinero"
                                    class="premio-img">
                            </picture>
                        </div>

                    </div>

                </div>

            </div>

        </section>

    </main>
    <!-- JS -->
    <script src="rifas.js"></script>

</body>

</html>
