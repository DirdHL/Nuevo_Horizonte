      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: Arial, Helvetica, sans-serif;
        background: #fafafa;
        color: #333;
        line-height: 1.4;
      }

      .hero {
        position: relative;
        width: 100%;
        height: 60vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .hero img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(0.65);
        display: block;
      }

      .hero h1 {
        position: absolute;
        color: #fff;
        font-size: clamp(1.6rem, 4vw, 3rem);
        text-align: center;
        padding: 0.5rem 1rem;
        text-shadow: 0 6px 18px rgba(0,0,0,0.6);
      }

    .gallery-wrap {
    max-width: 1800px; 
    margin: 22px auto;
    padding: 0 16px;
  }

      .gallery {
    column-count: 4; 
    column-gap: 16px;
  }

      .gallery img {
        width: 100%;
        height: auto;
        display: block;
        margin-bottom: 14px;
        border-radius: 8px;
        box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        break-inside: avoid;
        transition: transform 0.25s ease, box-shadow 0.25s ease;
      }

      .gallery img:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 28px rgba(0,0,0,0.12);
      }

      @media (max-width: 1200px) {
        .gallery { column-count: 4; }
      }

      @media (max-width: 900px) {
        .gallery { column-count: 3; }
      }

      @media (max-width: 600px) {
        .hero { height: 40vh; }
        .gallery { column-count: 2; }
      }
      
      
      @media (max-width: 300px) {
        .hero h1 { font-size: 1.8rem; padding: 0 12px; }
      }

      @media (max-width: 450px) {
        .gallery { column-count: 2; }
        .hero h1 { font-size: 1.6rem; padding: 0 8px; }
      }

      footer {
        text-align: center;
        padding: 20px 0 40px;
        color: #666;
        font-size: 0.95rem;
      }

      /* === LIGHTBOX === */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease;
  }

  .lightbox.active {
    opacity: 1;
    pointer-events: auto;
  }

  .lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
    box-shadow: 0 0 25px rgba(255,255,255,0.2);
    transform: scale(0.8);
    transition: transform .25s ease;
  }

  .lightbox.active img {
    transform: scale(1);
  }

  /* Cursor */
  .gallery img { cursor: pointer; }
  .lightbox { cursor: zoom-out; }

  .pagination {
  display: flex;
  justify-content: center;
  gap: 10px;             /* espacio entre botones */
  flex-wrap: wrap;       /* los números pueden bajar de línea si no entran */
  margin: 30px 0;
}

  .pagination button {
    background: #038f28;
    color: #ffffff;
    border: none;
    padding: 10px 16px;
    margin: 0 4px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    transition: background .2s;
  }

  .pagination button:hover {
    background: #04b91f;
  }

  .pagination button.active {
    background: #037f12;
  }

  .categories {
    text-align: center;
    margin: 25px 0;
  }

  .categories button {
    padding: 10px 16px;
    margin: 6px;
    border: none;
    border-radius: 6px;
    background: #0f8f03;
    color: #fff;
    cursor: pointer;
    font-size: 1rem;
    transition: background .2s;
  }

  .categories button:hover {
    background: #04b90a;
  }

  .categories button.active {
    background: #037f20;
  }

  .header {
    height: 120px; 
    padding: 0 25px;
    background-color: #fafafa;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    height: 100px; 
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer;
  }
  .logo:hover {
    transform: scale(1.10); 
  }

  .header {
    display: flex;
    justify-content: center; 
    align-items: center;   
  }

  /* ======================
    VIDEOS VIMEO
  ====================== */
  .videos-wrap {
    max-width: 1200px;
    margin: 40px auto;
    padding: 0 16px;
  }

  .videos-title {
    text-align: center;
    font-size: 2rem;
    margin-bottom: 20px;
    color: #138f03;
  }

  .videos {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 25px;
  }

.video-container {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9; /* valor inicial, pero se adapta si le agregamos otro */
  background: #000;
  overflow: hidden;
  border-radius: 12px;
  box-shadow: 0px 8px 20px rgba(0,0,0,0.15);
}

.video-container.vertical {
  aspect-ratio: 9 / 16; /* videos verticales */
}

.video-container.square {
  aspect-ratio: 1 / 1; /* videos cuadrados */
}

.video-container iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: 0;
}

  <script>
  // =======================
  // LIGHTBOX
  // =======================
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-img");

  // Delegación de eventos (abre cualquier imagen aunque se mueva en la paginación)
  document.querySelector(".gallery").addEventListener("click", (e) => {
    if (e.target.tagName === "IMG") {
      lightboxImg.src = e.target.src;
      lightbox.classList.add("active");
    }
  });

  // Cerrar lightbox
  lightbox.addEventListener("click", () => lightbox.classList.remove("active"));
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") lightbox.classList.remove("active");
  });


  // =======================
  // GALERÍA + PAGINACIÓN + FILTROS
  // =======================
  const gallery = document.querySelector(".gallery");
  const pagination = document.getElementById("pagination");
  const filterBtns = document.querySelectorAll(".categories button");

  let images = Array.from(document.querySelectorAll(".gallery img"));
  let filteredImages = images;

  let itemsPerPage = 20;
  let currentPage = 1;
  let totalPages = Math.ceil(images.length / itemsPerPage);

  // FILTRAR CATEGORÍAS
  function filterGallery(category) {
    filteredImages = (category === "todo")
      ? images
      : images.filter(img => img.dataset.category === category);

    totalPages = Math.ceil(filteredImages.length / itemsPerPage);
    currentPage = 1;
    showPage(currentPage);
  }

  // MOSTRAR PÁGINAS
  function showPage(page) {
    currentPage = page;
    gallery.innerHTML = "";

    let start = (page - 1) * itemsPerPage;
    let end = start + itemsPerPage;

    filteredImages.slice(start, end).forEach(img => gallery.appendChild(img));

    updatePaginationButtons();
    // Si tienes lazy loading aquí debe ir
    if (typeof applyLazyLoading === "function") applyLazyLoading();
  }

  // BOTONES DE PAGINACIÓN
  function updatePaginationButtons() {
    pagination.innerHTML = "";

    for (let i = 1; i <= totalPages; i++) {
      const btn = document.createElement("button");
      btn.textContent = i;
      if (i === currentPage) btn.classList.add("active");

      btn.onclick = () => showPage(i);
      pagination.appendChild(btn);
    }
  }

  // EVENTOS DE LOS BOTONES DE FILTRO
  filterBtns.forEach(btn => {
    btn.addEventListener("click", () => {
      filterBtns.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      filterGallery(btn.dataset.filter);
    });
  });

  // Mostrar primera página al cargar
  showPage(1);
  </script>
