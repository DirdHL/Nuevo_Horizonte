<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Importaciones Nuevo Horizonte - Todo el Perú</title>
    <link rel="stylesheet" href="importaciones.css" />
</head>
<body>

    <!-- ENCABEZADO COMPLETO -->
    <header class="encabezado">
        <!-- PARTE SUPERIOR -->
        <div class="encabezado-superior">
            <h1>IMPORTACIÓNES NUEVO HORIZONTE</h1>
        </div>
        <!-- PARTE INFERIOR -->
        <div class="encabezado-inferior">
            <div class="logo-container">
                <img src="../../img/importaciones/logo-nuevo-horizonte.svg" alt="Logo de la empresa" class="logo">
            </div>
            <div class="buscador-container">
                <!-- BUSCADOR POR LETRAS -->
                <div class="buscador-letras">
                    <input type="text" id="busqueda" placeholder="Buscar por nombre...">
                    <ul id="resultado-busqueda" class="lista-sugerencias"></ul>
                </div>
                <!-- SELECTOR DE PRODUCTOS -->
                <select id="selector-productos" class="selector-productos">
                    <option value="">Todos los productos</option>
                    <option>GRASS SINTÉTICO</option>
                    <option>LENTES DE NATACIÓN</option>
                    <option>REFLECTORES ELÉCTRICOS</option>
                    <option>REFLECTORES SOLARES</option>
                    <option>GLP</option>
                </select>
            </div>

<!-- CONTACTO DERECHA --> 
<div class="contacto-derecha">
    <a href="tel:905448688" class="telefono">905 448 688</a>
    <div class="bandera-tooltip">
        <img src="../../img/importaciones/peru.svg" alt="Perú" class="bandera">
        <span class="tooltip-text">Envíos a todo Perú</span>
    </div>
</div>
</header>

<script src="importaciones.js"></script>


</body>
</html>
