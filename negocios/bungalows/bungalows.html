<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bungalows Tomayquichua</title>
  <!-- Favicon -->
  <link rel="icon" href="../../img/bungalows-de-tomayquichua/logo-bungalows.svg" type="image/svg+xml">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="bungalows.css">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@500;700;800&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <!-- ==========================================
       CABECERA (HEADER) PRINCIPAL
       ========================================== -->
  <header class="header-bungalows">
    <!-- Contenedor central flexible -->
    <div class="header-container">
      
      <!-- LOGO & BRANDING -->
      <div class="branding">
        <a href="bungalows.html" class="brand-link" style="text-decoration: none; color: inherit;">
          <div class="brand-text">
            <h1 class="brand-title">Bungalows</h1>
            <p class="brand-subtitle">DE TOMAYQUICHUA</p>
          </div>
        </a>
      </div>

      <!-- MENÚ DE NAVEGACIÓN -->
      <nav class="nav-menu">
        <div class="nav-item-wrapper active">
          <a href="bungalows.html" class="nav-item">INICIO</a>
          <span class="leaf-line">— 🍃 —</span>
        </div>
        <span class="nav-separator">|</span>
        <div class="nav-item-wrapper">
          <a href="#servicios" class="nav-item">SERVICIOS</a>
        </div>
        <span class="nav-separator">|</span>
        <div class="nav-item-wrapper">
          <a href="#ubicacion" class="nav-item">UBICACIÓN</a>
        </div>
      </nav>

      <!-- BOTONES DE ACCIÓN (OCTOGONALES) -->
      <div class="action-buttons">
        
        <!-- Botón Álbum (Octogonal con borde terracota) -->
        <a href="bungalows-album.html" class="btn-oct btn-album" aria-label="Ver Álbum de Fotos">
          <span class="btn-oct-border"></span>
          <span class="btn-oct-inner">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
              <circle cx="12" cy="13" r="4"></circle>
            </svg>
            <span class="btn-text">ÁLBUM</span>
          </span>
        </a>

        <!-- Botón Reservas (Octogonal sólido verde) -->
        <a href="https://wa.me/51983406127" target="_blank" class="btn-oct btn-booking" aria-label="Hacer una Reserva por WhatsApp">
          <span class="btn-oct-border"></span>
          <span class="btn-oct-inner">
            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
            </svg>
            <span class="btn-text">RESERVAS</span>
          </span>
        </a>

      </div>


    </div>
  </header>

  <main>
    <section id="hero" style="padding: 100px 20px; text-align: center; font-family: 'Cinzel', serif;">
      <h2 style="color: #1e4620; font-size: 2.5rem; margin-bottom: 20px;">BIENVENIDO A TOMAYQUICHUA</h2>
      <p style="color: #8a4f2a; font-size: 1.2rem; max-width: 600px; margin: 0 auto; font-family: 'Montserrat', sans-serif;">
        Un lugar de eseño para desconectarte del mundo y disfrutar de la naturaleza en su estado más puro.
      </p>
    </section>
  </main>

  <script src="bungalows.js"></script>
</body>
</html>
